<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorite NBA Players</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/loading.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/favorites.js') }}" defer></script>
</head>

<body>
    <nav>
        <h2>NBA<span>Stats</span></h2>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/compare">Compare</a>
            <a href="{{ url_for('teams') }}">Teams</a>
            <a href="{{ url_for('league_leaders') }}">Leaders</a>
            <a href="{{ url_for('favorites') }}">Favorites</a>
            <a href="{{ url_for('about') }}">About</a>
        </div>
    </nav>

    <main class="favorites-page">
        <header class="favorites-header">
            <p>My NBA</p>
            <h1>Favorite Players</h1>
            <span>Players saved in this browser</span>
        </header>

        <section id="favoritesGrid" class="favorites-grid" aria-live="polite"></section>

        <section id="favoritesEmpty" class="favorites-empty">
            <h2>No favorite players yet</h2>
            <p>Open any player profile and select Add to Favorites.</p>
            <a href="/">Find a Player</a>
        </section>
    </main>
</body>

</html>
