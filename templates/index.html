<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Stats Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav>
    <h2>🏀 NBA Stats Dashboard</h2>
</nav>

<div class="hero">

    <h1>Search Any NBA Player</h1>

    <p>
        View player statistics, compare players,
        and explore NBA analytics.
    </p>

    <form method="POST">
    <input
        type="text"
        name="player_name"
        placeholder="Enter player name..."
        required
    >

    <button type="submit">
        Search
    </button>
</form>
{% if player %}
    <div class="player-card">
        <h2>{{ player.full_name }}</h2>
        <p><strong>Player ID:</strong> {{ player.id }}</p>
        <p><strong>Active:</strong> {{ player.is_active }}</p>
    </div>
{% endif %}

{% if error %}
    <p class="error">{{ error }}</p>
{% endif %}

</div>

</body>
</html>
