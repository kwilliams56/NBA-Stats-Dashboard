<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ team.name if team else "Team Profile" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <nav>
        <h2>NBA<span>Stats</span></h2>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/compare">Compare</a>
            <a href="{{ url_for('teams') }}">Teams</a>
            <a href="#">Favorites</a>
        </div>
    </nav>

    {% if team %}
    <main class="team-profile-page">
        <section class="team-profile-hero">
            {% if team.logo %}
            <img src="{{ team.logo }}" alt="{{ team.name }} logo">
            {% endif %}
            <p>{{ team.abbr }}</p>
            <h1>{{ team.name }}</h1>
        </section>

        <section class="team-profile-panel">
            <h2>Team Overview</h2>
            <div class="team-overview-grid">
                <div>
                    <h3>Franchise</h3>
                    <p>{{ team.name }}</p>
                </div>
                <div>
                    <h3>Abbreviation</h3>
                    <p>{{ team.abbr }}</p>
                </div>
                <div>
                    <h3>Data</h3>
                    <p>Roster and team stats coming next.</p>
                </div>
            </div>
        </section>
    </main>
    {% else %}
    <p class="error">{{ error }}</p>
    {% endif %}
</body>

</html>
